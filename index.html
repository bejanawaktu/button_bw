<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynk.id Buttons Rounded</title>
    <style>
        /* Reset dasar biar margin nggak berantakan */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: transparent; /* Transparan biar nyatu sama landing page */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px; 
        }

        /* Container khusus biar rapi di mobile viewport */
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 16px; /* Jarak antar tombol */
            width: 100%;
            max-width: 400px;
        }

        /* Styling Button Minimalist dengan Ujung Bulat */
        .lynk-btn {
            background-color: #000000;
            color: #ffffff;
            text-decoration: none;
            text-align: center;
            padding: 18px 24px;
            font-size: 16px;
            font-weight: 600;
            
            /* INI YANG DIUBAH: Sudut persegi dibikin bulat melengkung cantik */
            border-radius: 24px; 
            
            border: none;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent; /* Ilangin kotak biru pas di-tap di HP */
            
            /* Transisi smooth buat efek zoom */
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s ease;
        }

        /* Efek Ngezoom pas di-tap di HP */
        .lynk-btn:active {
            transform: scale(0.94); /* Efek mengecil/zoom in pas ditekan */
            background-color: #1a1a1a; /* Agak pudar sedikit biar kerasa interaksinya */
        }

        /* Tambahan: Responsif kalau dibuka di desktop/PC (efek hover) */
        @media (hover: hover) {
            .lynk-btn:hover {
                transform: scale(1.02); /* Sedikit membesar pas diarahkan mouse */
            }
            .lynk-btn:active {
                transform: scale(0.94);
            }
        }
    </style>
</head>
<body>

    <div class="button-container">
        <a href="#" class="lynk-btn">Ebook Lighting Setup</a>
        <a href="#" class="lynk-btn">Video Course</a>
        <a href="#" class="lynk-btn">Workshop recording</a>
        <a href="#" class="lynk-btn">Event</a>
    </div>

</body>
</html>
